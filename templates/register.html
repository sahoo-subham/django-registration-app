<style>
  body {
    background: linear-gradient(135deg, #667eea, #764ba2);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .form-container {
    width: 100%;
    max-width: 380px;
    padding: 30px 25px;
    border-radius: 15px;
    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(12px);
    box-shadow: 0 8px 30px rgba(0, 0, 0, 0.25);
    color: white;
  }

  h2 {
    margin-bottom: 20px;
    font-weight: 600;
  }

  .form-group {
    margin-bottom: 15px;
    text-align: left;
  }

  label {
    font-size: 14px;
    margin-bottom: 5px;
    display: block;
  }

  .form-control {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: none;
    background: rgba(255, 255, 255, 0.2);
    color: white;
    font-size: 14px;
  }

  .form-control:focus {
    outline: none;
    background: rgba(255, 255, 255, 0.3);
  }

  .btn-custom {
    width: 100%;
    margin-top: 10px;
    padding: 10px;
    border-radius: 25px;
    border: none;
    background: white;
    color: #764ba2;
    font-weight: 600;
    transition: 0.3s;
  }

  .btn-custom:hover {
    background: #f1f1f1;
  }
</style>

<form method="POST">
  {% csrf_token %}

  <div class="form-group">
    <label>Full Name</label>
    <input
      type="text"
      name="name"
      class="form-control"
      placeholder="Enter your full name"
      required
    />
  </div>

  <div class="form-group">
    <label>Age</label>
    <input
      type="number"
      name="age"
      class="form-control"
      placeholder="Enter your age"
      required
    />
  </div>

  <div class="form-group">
    <label>Email</label>
    <input
      type="email"
      name="email"
      class="form-control"
      placeholder="Enter your email"
      required
    />
  </div>

  <div class="form-group">
    <label>Phone Number</label>
    <input
      type="tel"
      name="phone"
      class="form-control"
      placeholder="Enter your phone number"
      required
    />
  </div>

  <div class="form-group">
    <label>Password</label>
    <input
      type="password"
      name="password"
      class="form-control"
      placeholder="Create a password"
      required
    />
  </div>

  <div class="form-group">
    <label>Confirm Password</label>
    <input
      type="password"
      name="confirm_password"
      class="form-control"
      placeholder="Confirm your password"
      required
    />
  </div>

  <button type="submit" class="btn-custom">Register</button>
</form>
