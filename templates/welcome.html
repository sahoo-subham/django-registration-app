{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Welcome</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            height: 100vh;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }
        .welcome-box {
            text-align: center;
            padding: 50px;
            border-radius: 15px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        .btn-custom {
            background-color: #ffffff;
            color: #764ba2;
            font-weight: bold;
            border-radius: 25px;
            padding: 10px 25px;
        }
        .btn-custom:hover {
            background-color: #f1f1f1;
        }
    </style>
</head>
<body>

    <div class="welcome-box">
        <h1 class="mb-3">Welcome 🚀</h1>
        <p class="mb-4">Start your journey with us. Create your account to continue.</p>

        <!-- Django URL redirect -->
        <a href="{% url 'register' %}" class="btn btn-custom">
            Go to Register
        </a>
    </div>

</body>
</html>
