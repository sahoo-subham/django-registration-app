<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Success</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      body {
        height: 100vh;
        background: linear-gradient(135deg, #667eea, #764ba2);
        display: flex;
        justify-content: center;
        align-items: center;
        color: white;
      }

      .card-box {
        text-align: center;
        padding: 40px;
        border-radius: 15px;
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(12px);
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
        animation: fadeIn 0.8s ease-in-out;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: scale(0.9);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }

      .btn-custom {
        margin-top: 20px;
        background: white;
        color: #764ba2;
        border-radius: 25px;
        padding: 10px 25px;
        font-weight: 600;
      }

      .btn-custom:hover {
        background: #f1f1f1;
      }
    </style>
  </head>
  <body>
    <div class="card-box">
      <h1>🎉 Success!</h1>
      <p class="mt-3">
        Hey <strong>{{ name }}</strong>, your data has been saved successfully.
      </p>

      <a href="{% url 'register' %}" class="btn btn-custom"> Add Another </a>
    </div>
  </body>
</html>
